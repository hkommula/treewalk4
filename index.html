<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UOW Campus Tree Walk</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />

    <style>
        :root {
            --uow-red: #E51937; --bg-dark: #0d1117;
            --panel-bg: rgba(13,17,23,0.94);
            --text-main: #e8edf3; --text-muted: #7d8a96; --text-dim: #4e5a66;
            --accent-green: #2ea043; --accent-blue: #3b82f6;
            --border-subtle: rgba(255,255,255,0.06); --border-soft: rgba(255,255,255,0.1);
            --card-bg: rgba(255,255,255,0.025); --card-bg-hover: rgba(255,255,255,0.055);
            --marker-size: 9px; /* Dynamically controlled by Zoom */
        }
        *,*::before,*::after{box-sizing:border-box}
        body,html{margin:0;padding:0;height:100%;overflow:hidden;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            background:var(--bg-dark);color:var(--text-main)}
        #map{position:absolute;top:0;left:0;width:100vw;height:100vh;z-index:1}

        /* ── Modern Minimalist Panel ── */
        #ui-panel{
            position:absolute;top:2vh;left:1vw;
            width:clamp(320px, 27vw, 390px);height:96vh;
            background:var(--panel-bg);
            backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
            border:1px solid var(--border-subtle);border-radius:12px;
            z-index:1000;display:flex;flex-direction:column;
            box-shadow:0 16px 48px rgba(0,0,0,0.7),0 0 0 0.5px rgba(255,255,255,0.04);
            overflow:hidden;
        }

        /* Mobile Drag Handle */
        #drag-handle-container {
            display: none; padding: 12px 0 4px; width: 100%; cursor: grab; touch-action:none; background: rgba(255,255,255,0.015);
        }
        #drag-handle {
            width: 12vw; height: 5px; background: rgba(255,255,255,0.2);
            border-radius: 4px; margin: 0 auto;
        }

        /* ── Ultra-Compact Header ── */
        .panel-header{position:relative; padding:10px 12px 12px; background:linear-gradient(180deg,rgba(13,18,25,.97),rgba(9,13,19,.93));
            border-bottom:1px solid rgba(255,255,255,.075);box-shadow:inset 0 -1px 0 rgba(229,25,55,.18);}
        @media (min-width: 769px) { .panel-header { padding: 10px 12px 12px; } }
        
        .header-top {display:grid;grid-template-columns:minmax(72px,auto) minmax(0,1fr) auto;gap:8px;align-items:center;margin-bottom:8px;}
        .uow-title{color:var(--text-main);font-weight:900;letter-spacing:0;
            font-size:1.06rem;margin:0;line-height:.92;align-self:center;}
        .uow-title span{color:var(--uow-red);display:block;}
        
        .route-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;background:rgba(255,255,255,0.025);padding:3px;border-radius:999px;border:1px solid rgba(255,255,255,.055);}
        .route-btn{font-size:0.62rem;font-weight:850;padding:6px 8px;border-radius:999px;
            border:none;background:transparent;color:var(--text-muted);cursor:pointer;
            transition:background .15s,color .15s,box-shadow .15s;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em;}
        .route-btn:hover{color:var(--text-main)}
        .route-btn.active{background:var(--uow-red);color:#fff; box-shadow:0 2px 7px rgba(229,25,55,.28)}
        .about-this-btn{height:30px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.035);
            color:var(--text-muted);border-radius:999px;padding:0 9px;font-size:.62rem;font-weight:850;
            text-transform:uppercase;letter-spacing:.03em;cursor:pointer;white-space:nowrap;}
        .about-this-btn:hover{color:var(--text-main);background:rgba(255,255,255,.07);}

        .header-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;font-size:0.68rem;color:var(--text-muted);font-weight:750;}
        .stat-item{min-height:32px;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(255,255,255,0.028);padding:5px 6px;border:1px solid rgba(255,255,255,.05);border-radius:8px;}
        .stat-item i{color:var(--uow-red);font-size:0.75rem;flex:0 0 auto;opacity:.9;}
        .stat-item span:last-child{min-width:0;text-align:center;line-height:1.2;overflow-wrap:anywhere;}
        
        .progress-track{position:absolute; bottom:0; left:0; width:100%; height:3px; background:rgba(255,255,255,0.05);}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--uow-red),#ff5370);
            transition:width .5s cubic-bezier(0.4, 0, 0.2, 1);width:0%}

        /* ── Scrollable Body ── */
        .panel-body{padding:1.5vh 2vw;overflow-y:auto;flex-grow:1;scroll-behavior:smooth;}
        @media (min-width: 769px) { .panel-body { padding: 1.5vh 1vw; } }
        .panel-body::-webkit-scrollbar{width:4px}
        .panel-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

        /* ── Tree Cards ── */
        .stops-label{font-size:.7rem;font-weight:700;text-transform:uppercase;
            letter-spacing:.8px;color:var(--text-dim);padding:0.5vh 1vw 1vh;}
        
        .tree-card{background:var(--card-bg);border:1px solid var(--border-subtle);
            border-radius:8px;padding:1.2vh 3vw;margin-bottom:0.8vh;cursor:pointer;
            display:flex;flex-direction:column;align-items:stretch;gap:4px;
            transition:background .15s,border-color .15s;}
        @media (min-width: 769px) { .tree-card { padding: 1.2vh 1vw; } }
        .tree-card:hover{background:var(--card-bg-hover); transform:translateY(-1px);}
        .tree-card.visited{border-color:rgba(46,160,67,.35);background:rgba(46,160,67,.04)}
        
        .tree-card-header{display:flex;align-items:center;justify-content:space-between;width:100%}
        .card-content{flex:1;min-width:0}
        .card-name{font-size:.9rem;font-weight:700;color:var(--text-main);
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
        .card-sci{font-size:.75rem;color:var(--text-muted);font-style:italic;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;margin-top:2px}
        .card-check{color:var(--accent-green);font-size:1.1rem;flex-shrink:0}

        /* ── Standalone Detail View ── */
        #tree-detail-view { display: none; flex-direction: column; height: 100%; }
        .detail-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
        .back-btn {
            background:rgba(59,130,246,.08); color: var(--accent-blue); border:1px solid rgba(59,130,246,.16); font-size: 0.68rem; font-weight: 800;
            cursor: pointer; display: inline-flex; align-items: center; gap: 4px; padding:5px 8px;border-radius:999px;
            flex:0 0 auto;
        }
        .back-btn:hover { color: #93c5fd;background:rgba(59,130,246,.12); }
        .detail-mini-coords{min-width:0;text-align:right;font-size:.66rem;color:var(--text-muted);
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .detail-mini-dist{font-size:.6rem;color:#2dd4bf;font-weight:850;}
        .detail-mini-help{font-size:.58rem;color:rgba(125,138,150,.72);font-weight:700;}
        
        .detail-card{background:transparent;border:0;border-radius:0;padding:4px 0 0;}
        .detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border-subtle);padding-bottom:10px;margin-bottom:10px;}
        .detail-head > div:first-child{min-width:0;}
        .detail-title { font-size: 1.05rem; font-weight: 850; color: var(--text-main); line-height: 1.15; margin:0; overflow-wrap:anywhere; }
        .detail-sci { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-top: 3px; line-height:1.2; }
        .detail-badge{flex:0 0 auto;color:var(--accent-green);background:rgba(46,160,67,.1);border:1px solid rgba(46,160,67,.26);border-radius:999px;padding:3px 6px;font-size:.62rem;font-weight:800;text-transform:uppercase;}

        .popup-body{padding:0}
        .popup-fam{font-size:.8rem;color:var(--text-main);margin-bottom:8px}
        .popup-fam span{color:var(--text-muted)}
        .feature-info{font-size:.76rem;line-height:1.35;color:var(--text-muted);background:rgba(255,255,255,.02);
            border:1px solid rgba(255,255,255,.045);border-radius:6px;padding:8px 10px;margin-bottom:10px;}
        .feature-info .about-title{display:block;color:rgba(232,237,243,.86);font-size:.68rem;font-weight:800;text-transform:uppercase;margin-bottom:6px;}
        .about-row{display:grid;grid-template-columns:58px minmax(0,1fr);gap:7px;align-items:start;}
        .about-row + .about-row{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.035);}
        .about-key{color:rgba(125,138,150,.58);font-weight:800;text-transform:uppercase;font-size:.62rem;white-space:nowrap;}
        .about-value{min-width:0;overflow-wrap:anywhere;color:rgba(232,237,243,.74);}
        .popup-btns{display:flex;gap:8px; margin-bottom:0;}
        @media (min-width: 769px) { .popup-btns { gap: 8px; } }
        .popup-btns .pb{flex:1; font-size:.76rem; padding:9px 10px; border-radius:6px;
            font-weight:600; cursor:pointer; border:none; text-align:center;
            text-decoration:none; display:block; white-space:nowrap;min-width:0;}
        .pb-visit{background:var(--accent-green);color:#fff}
        .pb-unvisit{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)!important;color:var(--text-muted)}
        .more-info{margin-bottom:10px;}
        .more-info-title{display:block;color:rgba(232,237,243,.78);font-size:.68rem;font-weight:800;text-transform:uppercase;margin-bottom:6px;}
        .more-info-links{display:flex;flex-wrap:wrap;gap:5px;}
        .more-info-link{display:inline-flex;align-items:center;gap:4px;width:max-content;max-width:100%;padding:5px 7px;border-radius:999px;
            border:1px solid rgba(255,255,255,.08);color:rgba(232,237,243,.76);background:rgba(255,255,255,.025);
            text-decoration:none;font-size:.64rem;font-weight:700;line-height:1;white-space:nowrap;}
        .more-info-link:hover{color:#fff;background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);}

        /* ── Image Viewer inside Detail ── */
        .popup-img-wrap{position:relative;width:100%;height:clamp(130px, 20vh, 190px); min-height: 120px; border-radius:8px;
            overflow:hidden;cursor:zoom-in;background:#1a1f26; margin:0 0 10px;}
        .popup-img-blur{position:absolute;inset:0;width:100%;height:100%;
            object-fit:cover;filter:blur(10px) brightness(.7);transform:scale(1.08);
            transition:opacity .3s ease}
        .popup-img-hi{position:absolute;inset:0;width:100%;height:100%;
            object-fit:cover;opacity:0;transition:opacity .4s ease,transform .3s ease}
        .popup-img-hi.loaded{opacity:1}
        .popup-img-wrap:hover .popup-img-hi.loaded{transform:scale(1.03)}

        /* ── Map Controls & Cluster Styles ── */
        .map-controls{position:absolute;top:2vh;right:2vw;z-index:1000;
            display:flex;flex-direction:column;gap:1vh; transition:opacity 0.3s ease;}
        .icon-btn{background:var(--panel-bg);color:var(--text-main);
            border:1px solid var(--border-soft);border-radius:8px;
            width:clamp(38px, 3.5vw, 46px);height:clamp(38px, 3.5vw, 46px);cursor:pointer;display:flex;align-items:center;
            justify-content:center;font-size:1.08rem;
            backdrop-filter:blur(18px);box-shadow:0 4px 14px rgba(0,0,0,.45);
            transition:background .15s}
        .icon-btn:hover{background:rgba(255,255,255,.12)}
        .icon-btn.active{background:var(--uow-red);border-color:transparent;color:#fff;}
        .icon-btn i{pointer-events:none;}
        #gps-toggle{position:relative;}
        #gps-toggle > i{transform:translate(-1px,1px);}
        #gps-toggle.locating,#gps-toggle.gps-active{background:var(--panel-bg);border-color:var(--border-soft);color:var(--text-main);}
        .gps-status-light{position:absolute;top:8px;right:9px;width:5px;height:5px;border-radius:50%;
            background:rgba(255,255,255,.24);box-shadow:0 0 0 1px rgba(0,0,0,.45);pointer-events:none;}
        #gps-toggle.locating .gps-status-light{background:#facc15;box-shadow:0 0 0 3px rgba(250,204,21,.18);animation:gps-light-pulse .85s ease-in-out infinite;}
        #gps-toggle.gps-active .gps-status-light{background:#86efac;box-shadow:0 0 0 3px rgba(46,160,67,.22);}
        .gps-prompt{position:absolute;top:2vh;right:calc(2vw + clamp(38px, 3.5vw, 46px) + 10px);z-index:1001;
            width:min(280px,calc(100vw - 96px));background:rgba(13,17,23,.94);border:1px solid rgba(255,255,255,.08);
            border-radius:12px;padding:11px;box-shadow:0 14px 34px rgba(0,0,0,.55);backdrop-filter:blur(18px);
            opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .18s,transform .18s;}
        .gps-prompt.show{opacity:1;transform:translateY(0);pointer-events:auto;}
        .gps-prompt-title{font-size:.76rem;font-weight:850;color:var(--text-main);margin-bottom:3px;}
        .gps-prompt-text{font-size:.68rem;line-height:1.35;color:var(--text-muted);margin-bottom:9px;}
        .gps-prompt-actions{display:flex;gap:6px;justify-content:flex-end;}
        .gps-prompt-btn{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text-muted);
            border-radius:999px;padding:6px 9px;font-size:.66rem;font-weight:800;cursor:pointer;}
        .gps-prompt-btn.primary{background:var(--uow-red);border-color:transparent;color:#fff;}

        /* MarkerCluster Overrides */
        .marker-cluster { background-color: rgba(229,25,55,0.45); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .marker-cluster div { background-color: var(--uow-red); color: white; font-weight: bold; border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 10px rgba(0,0,0,0.45); font-size: 0.72rem; }

        /* Leaflet Overrides */
        .leaflet-control-attribution{background:rgba(13,17,23,.75)!important;color:#4e5a66!important;font-size:.65rem!important}
        .leaflet-control-zoom {transition:opacity 0.3s ease;}
        .leaflet-control-zoom a{background:var(--panel-bg)!important;color:var(--text-main)!important;border-color:var(--border-soft)!important}
        
        .nearby-tree-label {
            background: rgba(13,17,23,0.85); border: 1px solid var(--accent-green);
            color: #fff; font-weight: 700; font-size: 0.75rem; border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 4px 8px;
        }
        .leaflet-tooltip.nearby-tree-label {background: transparent; border: none; box-shadow: none; padding: 0;}
        .leaflet-tooltip-top.nearby-tree-label::before {border-top-color: var(--accent-green);}
        .route-endpoint-label{background:rgba(13,17,23,.62)!important;border:1px solid rgba(255,255,255,.08)!important;
            color:rgba(232,237,243,.78)!important;border-radius:999px!important;padding:2px 6px!important;font-size:.62rem!important;
            font-weight:800!important;letter-spacing:.02em;text-transform:uppercase;box-shadow:0 4px 10px rgba(0,0,0,.25)!important;}
        .leaflet-tooltip-top.route-endpoint-label::before{border-top-color:rgba(13,17,23,.62)!important;}

        /* ── Lightbox ── */
        #lightbox{display:none;position:fixed;z-index:9999;inset:0;
            background:rgba(0,0,0,.95);justify-content:center;align-items:center;
            opacity:0;transition:opacity .25s;backdrop-filter:blur(12px)}
        #lightbox.show{display:flex;opacity:1}
        #lightbox img{max-width:90vw;max-height:88vh;border-radius:12px;box-shadow:0 0 50px rgba(0,0,0,.9)}
        .close-lb{position:absolute;top:2vh;right:3vw;font-size:2rem;
            color:rgba(255,255,255,.5);cursor:pointer;transition:color .15s;line-height:1}

        /* ── Mobile Viewports & Draggable Sheet ── */
        @keyframes gps-light-pulse{50%{transform:scale(1.45);box-shadow:0 0 0 5px rgba(250,204,21,.15)}}

        @media(max-width:1024px), (pointer:coarse){
            #drag-handle-container { display: block; }
            #ui-panel{top:auto;bottom:0;left:0;width:100vw;height:45vh;
                border-radius:20px 20px 0 0;border:none; border-top:1px solid var(--border-subtle);
                transition: height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
            #map{height:100vh}
            .map-controls{top:2vh;right:2vw}
            .icon-btn{width:38px;height:38px;font-size:1rem;}
            .map-controls{gap:8px;}
            #gps-toggle > i{transform:translate(-2px,2px) scale(.95);}
            .gps-status-light{right:5px;top:5px;width:5px;height:5px;}
            .gps-prompt{top:12px;right:54px;width:min(270px,calc(100vw - 72px));}
            .panel-header{padding:0 4vw 12px;}
            .header-top{grid-template-columns:70px 1fr;gap:8px;margin-bottom:8px;}
            .uow-title{font-size:1rem;}
            .header-stats{font-size:0.64rem;gap:4px;}
            .stat-item{min-height:30px;padding:4px 5px;}
            .tree-card { padding: 1.5vh 4vw; }
            .route-btn { font-size: 0.6rem; padding: 5px 6px;}
            .panel-body{padding:12px 4vw calc(12px + env(safe-area-inset-bottom));}
            .detail-card{padding:2px 0 0;}
            .detail-head{padding-bottom:8px;margin-bottom:8px;}
            .detail-mini-coords{font-size:.58rem;max-width:48vw;}
            .detail-mini-dist{font-size:.56rem;}
            .detail-mini-help{font-size:.54rem;}
            .popup-btns .pb{font-size:.74rem;padding:9px 8px;}
            .more-info-link{font-size:.62rem;padding:5px 6px;}
            .popup-img-wrap{height:clamp(108px, 16vh, 150px);min-height:108px;}
        }
        @media(max-width:360px){
            .header-top{grid-template-columns:1fr;gap:8px;}
            .uow-title span{display:inline;}
            .header-stats{font-size:.6rem;}
            .stat-item{min-height:28px;padding:4px;}
            .popup-btns .pb{font-size:.68rem;padding:8px 6px;}
            .about-row{grid-template-columns:52px minmax(0,1fr);}
            .detail-badge{display:none;}
        }
    </style>
</head>
<body>
<div id="map"></div>

<div id="ui-panel">
    <div id="drag-handle-container">
        <div id="drag-handle"></div>
    </div>
    <div class="panel-header">
        <div class="header-top">
            <h4 class="uow-title">UOW <span>Tree Walk</span></h4>
            <div class="route-controls">
                <button class="route-btn active" onclick="setRouteMode('recommended')" id="btn-recommended">Rec</button>
                <button class="route-btn" onclick="setRouteMode('auto')" id="btn-auto">Near</button>
                <button class="route-btn" onclick="setRouteMode('random')" id="btn-random">Rand</button>
            </div>
        </div>
        <div class="header-stats">
            <span class="stat-item" title="Progress"><i class="bi bi-check2-circle"></i> <span id="progress-text">0/0</span></span>
            <span class="stat-item" title="Distance Left"><i class="bi bi-signpost-split"></i> <span id="stat-dist">-- km</span></span>
            <span class="stat-item" title="Estimated Time"><i class="bi bi-clock-history"></i> <span id="stat-time">-- min</span></span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="panel-body">
        <div id="stops-list">
            <div style="text-align:center;padding-top:2rem;color:var(--text-muted)">
                <div style="width:24px;height:24px;border:3px solid var(--uow-red);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1vh"></div>
                <div style="font-size:.85rem">Loading mapping data…</div>
            </div>
        </div>
        <div id="tree-detail-view">
            <div class="detail-nav">
                <button class="back-btn" onclick="backToList()"><i class="bi bi-chevron-left"></i> Back to Tour List</button>
                <span id="detail-mini-coords" class="detail-mini-coords"></span>
            </div>
            <div id="detail-content-area"></div>
        </div>
    </div>
</div>

<div class="map-controls">
    <button id="home-view" class="icon-btn" title="Home view">
        <i class="bi bi-house-door"></i>
    </button>
    <button id="gps-toggle" class="icon-btn" title="Track my location">
        <span class="gps-status-light" aria-hidden="true"></span>
        <i class="bi bi-crosshair"></i>
    </button>
    <button id="satellite-toggle" class="icon-btn" title="Toggle Satellite Overlay">
        <i class="bi bi-globe"></i>
    </button>
    <button id="btn-paths" class="icon-btn active" title="Toggle Campus Paths">
        <i class="bi bi-signpost-split"></i>
    </button>
</div>

<div id="gps-prompt" class="gps-prompt" role="dialog" aria-live="polite" aria-label="Enable GPS">
    <div class="gps-prompt-title">Use GPS for this walk?</div>
    <div class="gps-prompt-text">Show your distance to selected trees and route from your current location.</div>
    <div class="gps-prompt-actions">
        <button id="gps-prompt-dismiss" class="gps-prompt-btn" type="button">Not now</button>
        <button id="gps-prompt-enable" class="gps-prompt-btn primary" type="button">Enable GPS</button>
    </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
    <i class="bi bi-x close-lb"></i>
    <img id="lightbox-img" src="" alt="Tree High Res">
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="./src/leaflet-simple-locate_v2.js"></script>

<script>
// ── 0. MOBILE BOTTOM SHEET DRAG LOGIC ────────────────────────
const uiPanel = document.getElementById('ui-panel');
const dragHandleContainer = document.getElementById('drag-handle-container');
let startY, startHeight, isDragging = false;

function isSheetLayout() {
    return window.innerWidth <= 1024 || window.matchMedia('(pointer: coarse)').matches;
}

dragHandleContainer.addEventListener('pointerdown', (e) => {
    if (!isSheetLayout()) return;
    startY = e.clientY;
    startHeight = uiPanel.getBoundingClientRect().height;
    isDragging = true;
    dragHandleContainer.setPointerCapture?.(e.pointerId);
    uiPanel.style.transition = 'none'; // Smooth follow finger
});

document.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    const dy = startY - e.clientY;
    let newHeight = startHeight + dy;
    
    // Bounds for relative scaling (22% to 88% of screen height)
    const minH = window.innerHeight * 0.22;
    const maxH = window.innerHeight * 0.88;
    
    if (newHeight > maxH) newHeight = maxH;
    if (newHeight < minH) newHeight = minH;
    
    uiPanel.style.height = `${newHeight}px`;
    recenterVisibleMap({ animate: false });
});

function endPanelDrag() {
    if (!isDragging) return;
    isDragging = false;
    uiPanel.style.transition = 'height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
    requestAnimationFrame(() => {
        map.invalidateSize();
        recenterVisibleMap({ animate: false });
    });
}

document.addEventListener('pointerup', endPanelDrag);
document.addEventListener('pointercancel', endPanelDrag);

// ── 1. MAP INIT, DYNAMIC MARKERS & AUTO-HIDE ─────────────────────────
const UOW_CENTER = [-34.405179721817376, 150.87717061799876];
function calcBounds() {
    const isMob = isSheetLayout();
    const baseLat = 0.005, baseLng = 0.009; // Tighter bounds for 80% coverage
    return [
        [UOW_CENTER[0] - baseLat * (isMob ? 1.5 : 1.1), UOW_CENTER[1] - baseLng * (isMob ? 1.3 : 1.1)],
        [UOW_CENTER[0] + baseLat * (isMob ? 1.8 : 1.1), UOW_CENTER[1] + baseLng * (isMob ? 1.3 : 1.1)]
    ];
}

const map = L.map('map', {
    maxBounds: calcBounds(), maxBoundsViscosity: 0.9, 
    minZoom: 17, // Enforced closer zoom level limit
    maxZoom: 20,
    zoomControl: false, preferCanvas: true
}).setView(UOW_CENTER, 18); // Set default to 17 so AOI is closer

window.addEventListener('resize', () => {
    map.setMaxBounds(calcBounds());
    if (!isSheetLayout()) uiPanel.style.height = '';
    requestAnimationFrame(() => {
        map.invalidateSize();
        updateMarkerScaleForViewport();
        recenterVisibleMap({ animate: false, maxZoom: 18 });
    });
}, { passive: true });
L.control.zoom({ position: 'bottomright' }).addTo(map);
const routeButtons = document.querySelectorAll('.route-btn');

function getMapPadding() {
    const panelRect = uiPanel.getBoundingClientRect();
    const pad = isSheetLayout() ? 16 : 24;
    if (isSheetLayout()) {
        const bottomPad = Math.min(Math.round(window.innerHeight * 0.6), Math.round(panelRect.height + pad));
        return {
            paddingTopLeft: [pad, pad],
            paddingBottomRight: [pad, bottomPad]
        };
    }
    return {
        paddingTopLeft: [Math.round(panelRect.right + pad), pad],
        paddingBottomRight: [pad, pad]
    };
}

function getVisibleCenterOffset() {
    const panelRect = uiPanel.getBoundingClientRect();
    if (isSheetLayout()) return L.point(0, -Math.min(panelRect.height, window.innerHeight * 0.6) / 2);
    return L.point(Math.max(0, panelRect.right) / 2, 0);
}

function getOffsetCenter(latlng, zoom) {
    const target = L.latLng(latlng);
    const targetPoint = map.project(target, zoom);
    return map.unproject(targetPoint.subtract(getVisibleCenterOffset()), zoom);
}

function flyToVisible(latlng, zoom, options = {}) {
    const targetZoom = zoom ?? map.getZoom();
    map.flyTo(getOffsetCenter(latlng, targetZoom), targetZoom, options);
}

function fitHomeView(options = {}) {
    map.fitBounds(getWalkBounds(), { ...getMapPadding(), ...options });
}

function recenterVisibleMap(options = {}) {
    if (activeTree) flyToVisible([activeTree.lat, activeTree.lng], map.getZoom(), options);
    else fitHomeView(options);
}

requestAnimationFrame(() => {
    map.invalidateSize();
    fitHomeView({ animate: false, maxZoom: 18 });
});

function getWalkBounds() {
    const points = (currentRoute.length ? currentRoute : treeData)
        .filter(t => Number.isFinite(t.lat) && Number.isFinite(t.lng))
        .map(t => [t.lat, t.lng]);
    if (!points.length) return calcBounds();
    return L.latLngBounds(points).pad(0.12);
}

// Marker Cluster Init
const markersClusterGroup = L.markerClusterGroup({
    disableClusteringAtZoom: 18,
    maxClusterRadius: 35,
    spiderfyOnMaxZoom: true
});

map.on('zoomend', updateMarkerScaleForViewport);
function updateMarkerScaleForViewport() {
    const z = map.getZoom();
    let size = z <= 16 ? '6px' : z === 17 ? '8px' : '10px';
    if (isSheetLayout()) size = z <= 16 ? '5px' : z === 17 ? '7px' : '8px';
    document.documentElement.style.setProperty('--marker-size', size);
}
updateMarkerScaleForViewport();

let controlsTimeout;
let controlFadeEls = null;
function getControlFadeEls() {
    if (!controlFadeEls) controlFadeEls = Array.from(document.querySelectorAll('.map-controls, .leaflet-control-zoom'));
    return controlFadeEls;
}
function showMapControls() {
    getControlFadeEls().forEach(el => { el.style.opacity = '1'; el.style.pointerEvents = 'auto'; });
    clearTimeout(controlsTimeout);
    controlsTimeout = setTimeout(() => {
        getControlFadeEls().forEach(el => { el.style.opacity = '0'; el.style.pointerEvents = 'none'; });
    }, 4000);
}
map.on('mousemove touchstart move zoomend click', showMapControls);
showMapControls();

const darkBase = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);
const esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20, opacity: 0.6 });
const darkLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', { maxZoom: 20, zIndex: 10 }).addTo(map);

let treeData = [], currentRoute = [];
const markersMap = {};
const treeById = new Map();
const treeSnapCache = new Map();
const nearbyTooltipIds = new Set();
const imageSrcCache = new Map();
const treeLinksCache = new Map();
let treeLinksPromise = null;
const routeGroupFull = L.layerGroup().addTo(map);
const routeGroupRemaining = L.layerGroup().addTo(map);
const routeEndpointGroup = L.layerGroup().addTo(map);
let endpointInitialLabelsShown = false;
let endpointLabelHideTimer = null;
let endpointTwoFingerHoldTimer = null;
const visitedStops = new Set();
let userLoc = null;
const networkGraph = {}, nodeCoords = {};
const networkSegments = [];
let activeTreeId = null;
let activeTree = null;
let lastUserRouteRenderLoc = null;
let gpsUpdateQueued = false;

const DEG = Math.PI / 180;
function getDistance(lat1, lon1, lat2, lon2) {
    const p1 = lat1*DEG, p2 = lat2*DEG;
    const dp = (lat2-lat1)*DEG, dl = (lon2-lon1)*DEG;
    const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
    return 6371e3 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function escapeHTML(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
}

function normalizeTreeLinkKey(value) {
    return String(value ?? '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function safeExternalURL(value) {
    try {
        const url = new URL(String(value ?? ''), window.location.href);
        return ['http:', 'https:'].includes(url.protocol) ? url.href : '';
    } catch (e) {
        return '';
    }
}

function getTreeLinks(treeName) {
    return treeLinksCache.get(normalizeTreeLinkKey(treeName)) || [];
}

function loadTreeLinks() {
    if (!treeLinksPromise) {
        treeLinksPromise = fetch('trees_links.json')
            .then(r => r.ok ? r.json() : [])
            .then(records => {
                treeLinksCache.clear();
                (Array.isArray(records) ? records : []).forEach(record => {
                    const links = Array.isArray(record.more_info)
                        ? record.more_info
                            .map(link => ({ label: String(link.label || '').trim(), url: safeExternalURL(link.url) }))
                            .filter(link => link.label && link.url)
                        : [];
                    if (record.name && links.length) treeLinksCache.set(normalizeTreeLinkKey(record.name), links);
                });
                return treeLinksCache;
            })
            .catch(() => treeLinksCache);
    }
    return treeLinksPromise;
}

async function getOptimizedImageSrc(url) {
    if (!url) return url;
    if (!imageSrcCache.has(url)) {
        imageSrcCache.set(url, (async () => {
            if (!('caches' in window)) return url;
            try {
                const cacheStorage = await caches.open('uow-tree-media-v1');
                let matched = await cacheStorage.match(url);
                if (!matched) { await cacheStorage.add(url); matched = await cacheStorage.match(url); }
                if (matched) return URL.createObjectURL(await matched.blob());
            } catch (e) {}
            return url;
        })());
    }
    return imageSrcCache.get(url);
}

// ── 2. CAMPUS PATHS & ADVANCED SNAP GEOMETRY ──────────────────
let pathsLayer = null;
fetch('campus_paths.geojson').then(r => r.json()).then(data => {
    data.features.forEach(f => {
        if (f.geometry?.type !== 'LineString') return;
        const coords = f.geometry.coordinates;
        for (let i = 0; i < coords.length - 1; i++) {
            const [lng1,lat1] = coords[i], [lng2,lat2] = coords[i+1];
            const k1 = `${lat1.toFixed(5)},${lng1.toFixed(5)}`;
            const k2 = `${lat2.toFixed(5)},${lng2.toFixed(5)}`;
            nodeCoords[k1] = [lat1, lng1]; nodeCoords[k2] = [lat2, lng2];
            networkSegments.push({ k1, k2, lat1, lng1, lat2, lng2 });
            const d = getDistance(lat1, lng1, lat2, lng2);
            (networkGraph[k1] ??= []).push({ to: k2, dist: d });
            (networkGraph[k2] ??= []).push({ to: k1, dist: d });
        }
    });
    pathsLayer = L.geoJSON(data, {
        style: f => {
            const hw = f.properties?.highway;
            return ['footway','path','pedestrian','steps'].includes(hw)
                ? { color: '#34d399', weight: 1.3, opacity: 0.18, interactive: false }
                : { color: '#34d399', weight: 1, opacity: 0.1, dashArray: '3,5', interactive: false };
        }
    }).addTo(map);
    loadTreeCSV();
}).catch(() => loadTreeCSV());

function sqDist(x1,y1, x2,y2) { return (x2-x1)**2 + (y2-y1)**2; }
function distToSegmentSquared(px,py, vx,vy, wx,wy) {
    const l2 = sqDist(vx,vy,wx,wy);
    if (l2 === 0) return sqDist(px,py,vx,vy);
    let t = ((px-vx)*(wx-vx) + (py-vy)*(wy-vy)) / l2;
    t = Math.max(0, Math.min(1, t));
    return sqDist(px,py, vx + t*(wx-vx), vy + t*(wy-vy));
}

function snapToNetwork(lat, lng) {
    if (!networkSegments.length) return null;
    let minD = Infinity, bestNodeKey = null;
    const cosLat = Math.cos(lat * DEG);
    const px = lng * cosLat, py = lat;

    for (const segment of networkSegments) {
        const { k1, k2, lat1, lng1, lat2, lng2 } = segment;
        const vx = lng1 * cosLat, vy = lat1;
        const wx = lng2 * cosLat, wy = lat2;
        const dSq = distToSegmentSquared(px, py, vx, vy, wx, wy);
        if (dSq < minD) {
            minD = dSq;
            const d1 = getDistance(lat, lng, lat1, lng1);
            const d2 = getDistance(lat, lng, lat2, lng2);
            bestNodeKey = d1 < d2 ? k1 : k2;
        }
    }
    return bestNodeKey || Object.keys(nodeCoords)[0];
}

function getTreeSnapKey(tree) {
    if (!tree) return null;
    if (!treeSnapCache.has(tree.id)) treeSnapCache.set(tree.id, snapToNetwork(tree.lat, tree.lng));
    return treeSnapCache.get(tree.id);
}

const _pathCache = new Map();
function findNetworkPath(sKey, eKey) {
    if (!networkGraph[sKey] || !networkGraph[eKey]) return null;
    const cacheKey = sKey < eKey ? `${sKey}|${eKey}` : `${eKey}|${sKey}`;
    if (_pathCache.has(cacheKey)) {
        const cached = _pathCache.get(cacheKey);
        return (sKey < eKey) ? cached : (cached ? [...cached].reverse() : null);
    }
    const distances = {}, previous = {}; const pq = [[0, sKey]];
    for (const k in networkGraph) distances[k] = Infinity;
    distances[sKey] = 0;
    while (pq.length) {
        pq.sort((a,b) => a[0]-b[0]);
        const [dist, u] = pq.shift();
        if (u === eKey) break;
        if (dist > distances[u]) continue;
        for (const { to, dist: w } of (networkGraph[u] || [])) {
            const alt = distances[u] + w;
            if (alt < distances[to]) { distances[to] = alt; previous[to] = u; pq.push([alt, to]); }
        }
    }
    if (distances[eKey] === Infinity) { _pathCache.set(cacheKey, null); return null; }
    const path = []; let curr = eKey;
    while (curr) { path.push(nodeCoords[curr]); curr = previous[curr]; }
    path.reverse(); _pathCache.set(cacheKey, path); return path;
}

// ── 3. CSV + MARKERS + UI RENDERING ────────────────────
function loadTreeCSV() {
    Papa.parse('trees.csv', {
        download: true, header: true, skipEmptyLines: true,
        async complete({ data }) {
            await loadTreeLinks();
            treeData = data
                .filter(r => r['Latitude'] && r['Longitude'])
                .map((r, i) => ({
                    id: i + 1, lat: parseFloat(r['Latitude']), lng: parseFloat(r['Longitude']),
                    name: r['Common Name'] || 'Unknown Tree', scientific: r['Scientific Name'] || 'Unknown Species',
                    family: r['Family'] || 'Unknown Family', features: r['Features'] || '',
                    img: r['Photo Filename'] ? `photos/${r['Photo Filename']}` : null,
                    moreInfo: getTreeLinks(r['Common Name'])
                }));
            treeById.clear();
            treeSnapCache.clear();
            treeData.forEach(tree => {
                treeById.set(tree.id, tree);
                treeSnapCache.set(tree.id, snapToNetwork(tree.lat, tree.lng));
            });
            buildMapMarkers();
            setRouteMode('recommended');
        }
    });
}

function getMarkerIcon(id, isActive, isVisited) {
    let bg = 'var(--uow-red)'; let border = '2px solid rgba(255,255,255,.85)';
    let shadow = '0 0 5px rgba(229,25,55,.5),0 0 0 3px rgba(229,25,55,.12)';
    let transform = isActive ? 'scale(1.35)' : 'scale(1)';
    
    if (isActive) {
        bg = '#ffff00'; border = '2px solid #fff';
        shadow = '0 0 14px #ffff00, 0 0 0 4px rgba(255,255,0,0.4)';
    } else if (isVisited) {
        bg = 'var(--accent-green)';
        shadow = '0 0 5px rgba(46,160,67,.5),0 0 0 3px rgba(46,160,67,.12)';
    }
    const htmlEl = `<div id="icon-${id}" style="background:${bg}; width:var(--marker-size); height:var(--marker-size); border-radius:50%; border:${border}; box-shadow:${shadow}; transform:${transform}; transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1);"></div>`;
    return L.divIcon({ html: htmlEl, className: '', iconSize: [10,10], iconAnchor: [5,5] });
}

function updateMarkerStyle(id) {
    if(markersMap[id]) markersMap[id].setIcon(getMarkerIcon(id, activeTreeId === id, visitedStops.has(id)));
}

function getMoreInfoHTML(tree, alaURL) {
    const links = [
        ...(Array.isArray(tree.moreInfo) ? tree.moreInfo : []),
        { label: 'Search ALA', url: alaURL }
    ];
    if (!links.length) return '';
    return `
        <div class="more-info">
            <span class="more-info-title">More Info</span>
            <div class="more-info-links">
                ${links.map(link => `
                    <a class="more-info-link" href="${escapeHTML(link.url)}" target="_blank" rel="noopener noreferrer">
                        ${escapeHTML(link.label)} <i class="bi bi-box-arrow-up-right"></i>
                    </a>
                `).join('')}
            </div>
        </div>
    `;
}

// ── HTML Injector for Dedicated Detail View ──
function getDetailsHTML(tree) {
    const ala = `https://bie.ala.org.au/search?q=${encodeURIComponent(tree.scientific)}`;
    const imgBlock = tree.img
        ? `<div class="popup-img-wrap" onclick="event.stopPropagation(); openLightbox('${tree.img}')" id="iw-${tree.id}">
               <div class="popup-skel" id="sk-${tree.id}"></div>
               <img class="popup-img-blur" id="bl-${tree.id}" src="" alt="">
               <img class="popup-img-hi" id="hi-${tree.id}" src="" alt="" onload="hiLoad(${tree.id})" onerror="hiErr(${tree.id})">
           </div>` : '';

    const vis = visitedStops.has(tree.id);
    const btnClass = vis ? 'pb pb-unvisit' : 'pb pb-visit';
    const btnText = vis ? `<i class="bi bi-arrow-counterclockwise" style="margin-right:4px"></i>Mark Unvisited` : `<i class="bi bi-check2-circle" style="margin-right:4px"></i>Mark as Visited`;

    const aboutHtml = `
        <div class="feature-info">
            <span class="about-title">About</span>
            <div class="about-row">
                <span class="about-key">Family</span>
                <span class="about-value">${escapeHTML(tree.family)}</span>
            </div>
            ${tree.features ? `
                <div class="about-row">
                    <span class="about-key">Features</span>
                    <span class="about-value">${escapeHTML(tree.features)}</span>
                </div>
            ` : ''}
        </div>
    `;

    return `
        <div class="detail-card">
            <div class="detail-head">
                <div>
                    <h3 class="detail-title">${tree.name}</h3>
                    <div class="detail-sci">${tree.scientific}</div>
                </div>
                <div class="detail-badge">Stop ${tree.id}</div>
            </div>

            <div class="popup-body">
                ${imgBlock}
                ${aboutHtml}
                ${getMoreInfoHTML(tree, ala)}
                <div class="popup-btns">
                    <button class="${btnClass}" id="bv-${tree.id}">${btnText}</button>
                </div>
            </div>
        </div>
    `;
}

window.hiLoad = id => {
    const hi = document.getElementById(`hi-${id}`); const sk = document.getElementById(`sk-${id}`); const bl = document.getElementById(`bl-${id}`);
    if (hi) hi.classList.add('loaded'); if (sk) sk.style.display = 'none'; if (bl) setTimeout(() => bl.style.opacity = '0', 250);
};
window.hiErr = id => { const sk = document.getElementById(`sk-${id}`); if (sk) { sk.style.animation = 'none'; sk.style.background = '#161b22'; } };

function buildMapMarkers() {
    treeData.forEach(tree => {
        const marker = L.marker([tree.lat, tree.lng], { icon: getMarkerIcon(tree.id, false, false) });
        markersMap[tree.id] = marker;
        marker.on('click', () => { activateTree(tree.id); flyToVisible([tree.lat, tree.lng], 19, {animate: true, duration: 0.8}); });
        markersClusterGroup.addLayer(marker);
    });
    map.addLayer(markersClusterGroup);
}

// ── 4. ROUTES & FADING LOGIC ─────────────────────────────────
function setRouteMode(mode) {
    routeButtons.forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${mode}`).classList.add('active');
    
    if (mode === 'recommended') currentRoute = [...treeData]; 
    else if (mode === 'random') currentRoute = [...treeData].sort(() => Math.random() - .5); 
    else if (mode === 'auto') {
        if (!userLoc) { alert('Enable GPS context configuration first.'); setRouteMode('recommended'); return; }
        let rem = [...treeData], cur = userLoc; currentRoute = [];
        while (rem.length) {
            let ni = 0, md = Infinity;
            rem.forEach((p, i) => { const d = getDistance(cur.lat, cur.lng, p.lat, p.lng); if (d < md) { md = d; ni = i; } });
            const np = rem.splice(ni, 1)[0]; currentRoute.push(np); cur = np;
        }
    }
    renderSidebar();
    generateSmartRoutes({ force: true });
    if (!activeTree) fitHomeView({ animate: false, maxZoom: 18 });
}

function addSegment(start, end, isNet, trackState) {
    if (!start || !end) return 0;
    
    let finalOpacity = trackState === 'faded' ? 0.09 : 0.55;
    let finalWeight = trackState === 'faded' ? (isNet ? 2 : 1.5) : (isNet ? 4 : 2);

    const sf = isNet ? { color:'#E51937', weight:3, opacity:.045, interactive:false } : { color:'#fff', weight:1.5, opacity:.06, dashArray:'3,6', interactive:false };
    const sa = isNet ? { color:'#E51937', weight:finalWeight, opacity:finalOpacity, lineCap:'round', interactive:false } : { color:'#ff6b8a', weight:finalWeight, opacity:finalOpacity, dashArray:'4,6', interactive:false };
                     
    L.polyline([start, end], sf).addTo(routeGroupFull);
    L.polyline([start, end], sa).addTo(routeGroupRemaining);
    
    if (isNet && Array.isArray(start[0])) {
        let d = 0; for (let i = 0; i < start.length - 1; i++) d += getDistance(start[i][0], start[i][1], start[i+1][0], start[i+1][1]);
        return d;
    }
    return getDistance(start[0], start[1], end[0], end[1]);
}

function formatTime(mins) {
    if (mins >= 60) {
        const hrs = Math.floor(mins / 60); const rem = mins % 60;
        return rem > 0 ? `${hrs} hr ${rem} min` : `${hrs} hr`;
    }
    return `${mins} min`;
}

function addRouteEndpoint(tree, color, label, showInitialLabel) {
    if (!tree) return;
    const point = L.circleMarker([tree.lat, tree.lng], {
        radius: 12,
        color,
        weight: 2,
        opacity: 0.5,
        fillColor: color,
        fillOpacity: 0.16,
        interactive: true,
        bubblingMouseEvents: false
    }).addTo(routeEndpointGroup);
    L.circleMarker([tree.lat, tree.lng], {
        radius: 4,
        color: '#fff',
        weight: 1.5,
        opacity: 0.9,
        fillColor: color,
        fillOpacity: 0.95,
        interactive: false
    }).addTo(routeEndpointGroup);
    point.bindTooltip(label, {
        direction: 'top',
        offset: [0, -10],
        className: 'route-endpoint-label',
        opacity: 1,
        permanent: false
    });
    point.on('mouseover', () => point.openTooltip());
    point.on('mouseout', () => point.closeTooltip());
    point.on('click touchstart', () => {
        point.openTooltip();
        clearTimeout(point._endpointTouchTimer);
        point._endpointTouchTimer = setTimeout(() => point.closeTooltip(), 2200);
    });
    if (showInitialLabel) point.openTooltip();
}

function updateRouteEndpoints() {
    clearTimeout(endpointLabelHideTimer);
    routeEndpointGroup.clearLayers();
    if (!currentRoute.length) return;
    const startTree = currentRoute[0];
    const endTree = currentRoute[currentRoute.length - 1];
    const showInitialLabel = !endpointInitialLabelsShown;
    addRouteEndpoint(startTree, '#2ea043', 'Start', showInitialLabel);
    if (endTree && endTree.id !== startTree.id) addRouteEndpoint(endTree, '#E51937', 'End', showInitialLabel);
    if (showInitialLabel) {
        endpointInitialLabelsShown = true;
        endpointLabelHideTimer = setTimeout(() => {
            hideEndpointLabels();
        }, 4000);
    }
}

function showEndpointLabels(duration = 2800) {
    clearTimeout(endpointLabelHideTimer);
    routeEndpointGroup.eachLayer(layer => {
        if (typeof layer.getTooltip === 'function' && layer.getTooltip()) layer.openTooltip();
    });
    endpointLabelHideTimer = setTimeout(hideEndpointLabels, duration);
}

function hideEndpointLabels() {
    routeEndpointGroup.eachLayer(layer => {
        if (typeof layer.getTooltip === 'function' && layer.getTooltip()) layer.closeTooltip();
    });
}

function handleEndpointTwoFingerStart(event) {
    if (!isSheetLayout() || event.touches?.length !== 2) return;
    clearTimeout(endpointTwoFingerHoldTimer);
    endpointTwoFingerHoldTimer = setTimeout(() => showEndpointLabels(3200), 650);
}

function handleEndpointTwoFingerEnd(event) {
    if (!event.touches || event.touches.length < 2) clearTimeout(endpointTwoFingerHoldTimer);
}

const mapTouchTarget = map.getContainer();
mapTouchTarget.addEventListener('touchstart', handleEndpointTwoFingerStart, { passive: true });
mapTouchTarget.addEventListener('touchmove', handleEndpointTwoFingerEnd, { passive: true });
mapTouchTarget.addEventListener('touchend', handleEndpointTwoFingerEnd, { passive: true });
mapTouchTarget.addEventListener('touchcancel', handleEndpointTwoFingerEnd, { passive: true });

function generateSmartRoutes(options = {}) {
    const force = options.force === true;
    if (!force && userLoc && lastUserRouteRenderLoc) {
        const moved = getDistance(lastUserRouteRenderLoc.lat, lastUserRouteRenderLoc.lng, userLoc.lat, userLoc.lng);
        if (moved < 8) return;
    }
    routeGroupFull.clearLayers(); routeGroupRemaining.clearLayers(); routeEndpointGroup.clearLayers();
    let activeDist = 0; let nextIdx = 0;
    if (userLoc) {
        nextIdx = currentRoute.findIndex(t => !visitedStops.has(t.id));
        if (nextIdx === -1) nextIdx = currentRoute.length;
    }
    for (let i = 0; i < currentRoute.length; i++) {
        const startTree = currentRoute[i];
        const { lat: sLat, lng: sLng } = startTree;
        if (i === nextIdx && userLoc) {
            const sk = snapToNetwork(userLoc.lat, userLoc.lng);
            const ek = getTreeSnapKey(startTree);
            if (sk && ek) {
                activeDist += addSegment([userLoc.lat, userLoc.lng], nodeCoords[sk], false, 'active');
                const np = findNetworkPath(sk, ek);
                if (np) activeDist += addSegment(np, np, true, 'active');
                activeDist += addSegment(nodeCoords[ek], [sLat, sLng], false, 'active');
            } else { activeDist += addSegment([userLoc.lat, userLoc.lng], [sLat, sLng], false, 'active'); }
        }
        if (i < currentRoute.length - 1) {
            const endTree = currentRoute[i + 1];
            const { lat: eLat, lng: eLng } = endTree;
            const sk = getTreeSnapKey(startTree), ek = getTreeSnapKey(endTree);
            const trackState = i >= nextIdx ? 'active' : 'faded'; 
            
            if (sk && ek) {
                const d1 = addSegment([sLat,sLng], nodeCoords[sk], false, trackState);
                const np = findNetworkPath(sk, ek);
                const d2 = np ? addSegment(np, np, true, trackState) : 0;
                const d3 = addSegment(nodeCoords[ek], [eLat,eLng], false, trackState);
                if (trackState === 'active') activeDist += d1+d2+d3;
            } else {
                const df = addSegment([sLat,sLng], [eLat,eLng], false, trackState);
                if (trackState === 'active') activeDist += df;
            }
        }
    }
    updateRouteEndpoints();
    if (activeDist === 0 && currentRoute.length && !userLoc && nextIdx === 0) {
        document.getElementById('stat-dist').textContent = "Map View";
        document.getElementById('stat-time').textContent = "--";
    } else {
        const km = (activeDist/1000).toFixed(2);
        const mins = Math.ceil((activeDist/1000)*13.5);
        document.getElementById('stat-dist').textContent = `${km} km`;
        document.getElementById('stat-time').textContent = formatTime(mins);
    }
    lastUserRouteRenderLoc = userLoc ? { ...userLoc } : null;
    updateProgress();
}

function updateProgress() {
    const total = currentRoute.length;
    const done = Math.min(visitedStops.size, total);
    const pct = total ? Math.round(done/total*100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${done}/${total}`;
}

// ── 5. LIVE PROXIMITY TOOLTIPS & DISTANCES ─────────────────
function updateDynamicGPSContexts() {
    if (!userLoc) return;
    const nextNearbyIds = new Set();
    treeData.forEach(t => {
        const d = getDistance(userLoc.lat, userLoc.lng, t.lat, t.lng);
        const marker = markersMap[t.id];
        if (!marker) return;
        
        if (d <= 25) {
            nextNearbyIds.add(t.id);
            if (!nearbyTooltipIds.has(t.id)) {
                marker.bindTooltip(t.name, {permanent: true, direction: 'top', className: 'nearby-tree-label', offset: [0, -5]}).openTooltip();
            }
        }
    });
    nearbyTooltipIds.forEach(id => {
        if (nextNearbyIds.has(id)) return;
        const marker = markersMap[id];
        if (marker) marker.unbindTooltip();
    });
    nearbyTooltipIds.clear();
    nextNearbyIds.forEach(id => nearbyTooltipIds.add(id));

    if (activeTreeId && activeTree) updateDetailMiniCoords(activeTree);
}

// ── 6. PANEL VIEW LOGIC ─────────────────────────────────────
const stopsList = document.getElementById('stops-list');
const detailViewArea = document.getElementById('tree-detail-view');
const detailContentArea = document.getElementById('detail-content-area');
const detailMiniCoords = document.getElementById('detail-mini-coords');

function updateDetailMiniCoords(tree) {
    if (!detailMiniCoords || !tree) return;
    detailMiniCoords.innerHTML = userLoc
        ? `<span class="detail-mini-dist">${Math.round(getDistance(userLoc.lat, userLoc.lng, tree.lat, tree.lng))}m away</span>`
        : `<span class="detail-mini-help">Enable GPS for distance</span>`;
}

function fitDetailSheetToContent() {
    if (!isSheetLayout()) return;
    requestAnimationFrame(() => {
        const dragHeight = dragHandleContainer.offsetHeight || 0;
        const headerHeight = document.querySelector('.panel-header')?.offsetHeight || 0;
        const navHeight = detailViewArea.querySelector('.detail-nav')?.offsetHeight || 0;
        const bodyContentHeight = navHeight + detailContentArea.scrollHeight + 16;
        const minHeight = window.innerHeight * 0.48;
        const maxHeight = window.innerHeight * 0.88;
        const targetHeight = Math.min(maxHeight, Math.max(minHeight, dragHeight + headerHeight + bodyContentHeight + 20));
        uiPanel.style.height = `${Math.round(targetHeight)}px`;
        map.invalidateSize();
        if (activeTree) flyToVisible([activeTree.lat, activeTree.lng], map.getZoom(), { animate: false });
    });
}

function syncCardVisitedState(id) {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;
    const isVisited = visitedStops.has(id);
    card.classList.toggle('visited', isVisited);
    const cardHeader = card.querySelector('.tree-card-header');
    if (!cardHeader) return;
    const existingIndicator = cardHeader.lastElementChild;
    if (isVisited) {
        if (!existingIndicator || !existingIndicator.classList.contains('card-check')) {
            const icon = document.createElement('i');
            icon.className = 'bi bi-check-circle-fill card-check';
            if (existingIndicator) existingIndicator.replaceWith(icon);
            else cardHeader.appendChild(icon);
        }
    } else if (existingIndicator) {
        existingIndicator.replaceWith(document.createElement('span'));
    }
}

function updateDetailVisitButton(id) {
    const btn = document.getElementById(`bv-${id}`);
    if (!btn) return;
    const isVisited = visitedStops.has(id);
    btn.className = isVisited ? 'pb pb-unvisit' : 'pb pb-visit';
    btn.innerHTML = isVisited
        ? `<i class="bi bi-arrow-counterclockwise" style="margin-right:4px"></i>Mark Unvisited`
        : `<i class="bi bi-check2-circle" style="margin-right:4px"></i>Mark as Visited`;
}

function renderSidebar() {
    const frag = document.createDocumentFragment();
    const label = document.createElement('div');
    label.className = 'stops-label'; label.textContent = 'Walk Stops';
    frag.appendChild(label);

    currentRoute.forEach((tree, idx) => {
        const vis = visitedStops.has(tree.id);
        const card = document.createElement('div');
        card.className = `tree-card${vis ? ' visited' : ''}`;
        card.id = `card-${tree.id}`;
        card.dataset.treeId = tree.id;

        card.innerHTML = `
            <div class="tree-card-header">
                <div class="card-content">
                    <div class="card-name" title="${tree.name}">${idx+1}. ${tree.name}</div>
                    <div class="card-sci">${tree.scientific}</div>
                </div>
                ${vis ? `<i class="bi bi-check-circle-fill card-check"></i>` : `<span></span>`}
            </div>
        `;
        frag.appendChild(card);
    });

    stopsList.innerHTML = ''; stopsList.appendChild(frag);
    updateProgress();
}

stopsList.addEventListener('click', event => {
    const card = event.target.closest('.tree-card');
    if (!card) return;
    const id = Number(card.dataset.treeId);
    const tree = treeById.get(id);
    if (!tree) return;
    activateTree(id);
    flyToVisible([tree.lat, tree.lng], 19, {animate: true, duration: 0.6});
});

function activateTree(id) {
    const prevActiveId = activeTreeId;
    activeTreeId = id;
    activeTree = treeById.get(id) || null;
    
    if (prevActiveId) updateMarkerStyle(prevActiveId);
    if (activeTreeId) updateMarkerStyle(activeTreeId);

    // Swap Panel Views
    stopsList.style.display = 'none';
    detailViewArea.style.display = 'flex';
    
    const tree = activeTree;
    if (tree) {
        updateDetailMiniCoords(tree);
        detailContentArea.innerHTML = getDetailsHTML(tree);
        
        // Setup Visit Toggle Button
        const btn = document.getElementById(`bv-${id}`);
        if (btn) {
            btn.onclick = (e) => {
                e.stopPropagation();
                if (visitedStops.has(id)) visitedStops.delete(id); else visitedStops.add(id);
                updateMarkerStyle(id); 
                syncCardVisitedState(id);
                updateDetailVisitButton(id);
                generateSmartRoutes({ force: true });
            };
        }
        
        if (tree.img) {
            getOptimizedImageSrc(tree.img).then(src => {
                const hi = document.getElementById(`hi-${id}`); const bl = document.getElementById(`bl-${id}`);
                if (hi) hi.src = src; if (bl) bl.src = src;
                fitDetailSheetToContent();
            });
        }
        fitDetailSheetToContent();
    }
}

window.backToList = () => {
    if (activeTreeId) {
        const prevId = activeTreeId;
        activeTreeId = null;
        activeTree = null;
        updateMarkerStyle(prevId);
    }
    if (detailMiniCoords) detailMiniCoords.textContent = '';
    detailViewArea.style.display = 'none';
    stopsList.style.display = 'block';
    if (isSheetLayout()) uiPanel.style.height = '45vh';
    fitHomeView({animate: true, duration: 0.8});
};

// ── 7. LIGHTBOX ──────────────────────────────────────────────
window.openLightbox = async src => {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = await getOptimizedImageSrc(src);
    lb.style.display = 'flex'; requestAnimationFrame(() => lb.style.opacity = '1');
};
window.closeLightbox = () => {
    const lb = document.getElementById('lightbox');
    lb.style.opacity = '0'; setTimeout(() => lb.style.display = 'none', 250);
};

// ── 8. LEAFLET SIMPLE LOCATE INTEGRATION ──────────────────────
let simpleLocate = null;
const gpsButton = document.getElementById('gps-toggle');

// Helper functions
function clearNearbyTooltips() {
    nearbyTooltipIds.forEach(id => {
        const marker = markersMap[id];
        if (marker) marker.unbindTooltip();
    });
    nearbyTooltipIds.clear();
}

function scheduleGPSRefresh(forceRouteRefresh = false) {
    if (forceRouteRefresh) lastUserRouteRenderLoc = null;
    if (gpsUpdateQueued) return;
    gpsUpdateQueued = true;
    requestAnimationFrame(() => {
        gpsUpdateQueued = false;
        updateDynamicGPSContexts();
        generateSmartRoutes({ force: forceRouteRefresh });
    });
}

function setGPSButtonState(state) {
    gpsButton.classList.remove('active', 'locating', 'gps-active');
    if (state === 'locating') {
        gpsButton.classList.add('locating');
    } else if (state === 'active') {
        gpsButton.classList.add('gps-active');
    }
}

function resetGPSContext() {
    userLoc = null;
    if (activeTree) updateDetailMiniCoords(activeTree);
    lastUserRouteRenderLoc = null;
    clearNearbyTooltips();
    generateSmartRoutes({ force: true });
}

simpleLocate = new SimpleLocate({
    button: gpsButton,
    geofenceCenter: UOW_CENTER,
    geofenceRadius: 2000,
    highAccuracy: true,
    timeout: 15000,
    maximumAge: 5000,
    onLocationFound: (location) => {
        const shouldZoomToUser = !userLoc;
        userLoc = {
            lat: location.lat,
            lng: location.lng,
            accuracy: location.accuracy,
            heading: location.heading
        };

        if (shouldZoomToUser) {
            flyToVisible([userLoc.lat, userLoc.lng], 19, { animate: true });
        }
        scheduleGPSRefresh();
    },
    onLocationError: (error) => {
        resetGPSContext();
        if (error?.type === 'stopped') return;
        console.error('Geolocation error:', error);
        alert(error?.message || 'Unable to obtain your location.');
    },
    onGeofenceViolation: () => {
        alert('Sorry, you are too far away. Move closer to the area for the tracking feature.');
    }
}).attachTo(map);

document.getElementById('home-view').addEventListener('click', () => {
    fitHomeView({animate: true, duration: 0.8, maxZoom: 18});
});

document.getElementById('satellite-toggle').addEventListener('click', function() {
    if (map.hasLayer(esriSatellite)) { map.removeLayer(esriSatellite); this.classList.remove('active'); } 
    else { map.addLayer(esriSatellite); this.classList.add('active'); }
});
document.getElementById('btn-paths').addEventListener('click', function() {
    if (!pathsLayer) return;
    if (map.hasLayer(pathsLayer)) { map.removeLayer(pathsLayer); this.classList.remove('active'); } 
    else { map.addLayer(pathsLayer); this.classList.add('active'); }
});
</script>
